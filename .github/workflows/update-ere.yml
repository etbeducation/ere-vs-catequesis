name: Actualización Trimestral ERE vs Catequesis

on:
  schedule:
    - cron: '0 8 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Consultar Magisterium AI
        id: review
        env:
          MAGISTERIUM_API_KEY: ${{ secrets.MAGISTERIUM_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os
          from datetime import date

          api_key = os.environ["MAGISTERIUM_API_KEY"]
          today = date.today().isoformat()

          prompt = f"""Revisa la distincion ERE vs Catequesis segun el Magisterio catolico. Responde SOLO en JSON sin markdown:
          {{"hay_cambios": false, "nuevos_documentos": [], "correcciones": [], "resumen": "texto breve", "fecha_revision": "{today}"}}
          Documentos ya incluidos: The Religious Dimension of Education in a Catholic School (1988), Juan Pablo II Discurso 1981, Catechesi Tradendae (1979), Francisco Pacto Educativo Global (2020), Leon XIV Drawing New Maps of Hope (2025), Leon XIV Dilexi te (2025).
          Hay documentos nuevos del Magisterio relevantes posteriores a abril 2026?"""

          try:
              r = requests.post("https://www.magisterium.com/api/v1/chat/completions",
                  headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
                  json={"model": "magisterium-1", "messages": [{"role": "user", "content": prompt}]},
                  timeout=60)
              txt = r.json()["choices"][0]["message"]["content"].strip()
          except Exception as e:
              txt = f'{{"hay_cambios": false, "resumen": "Error: {str(e)[:100]}", "fecha_revision": "{today}"}}'

          if '```' in txt:
              for p in txt.split('```'):
                  p = p.strip().lstrip('json').strip()
                  if p.startswith('{'):
                      txt = p; break

          try:
              data = json.loads(txt)
          except:
              data = {"hay_cambios": False, "resumen": "Error parseando respuesta", "fecha_revision": today}

          with open("revision_result.json", "w") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          resumen = data.get('resumen','Sin datos').replace('\n',' ').replace('"','')
          nuevos = ', '.join(data.get('nuevos_documentos',[])) or 'Ninguno'
          hay_cambios = str(data.get('hay_cambios',False)).lower()

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"hay_cambios={hay_cambios}\n")
              f.write(f"resumen={resumen}\n")
              f.write(f"nuevos={nuevos}\n")
              f.write(f"fecha={today}\n")
          PYEOF

      - name: Registrar en Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          RUN_URL: https://github.com/etbeducation/ere-vs-catequesis/actions/runs/${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os

          token = os.environ["NOTION_TOKEN"]
          run_url = os.environ["RUN_URL"]
          fecha = "${{ steps.review.outputs.fecha }}"
          resumen = "${{ steps.review.outputs.resumen }}"
          nuevos = "${{ steps.review.outputs.nuevos }}"
          hay_cambios = "${{ steps.review.outputs.hay_cambios }}"

          resultado = "Hay cambios" if hay_cambios == "true" else "Sin cambios"
          titulo = f"{fecha} - {resultado}"

          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }

          payload = {
              "parent": {"database_id": "739fbeb2d24b4b879615a6247b402809"},
              "properties": {
                  "Titulo": {"title": [{"text": {"content": titulo}}]},
                  "Resultado": {"select": {"name": resultado}},
                  "Resumen": {"rich_text": [{"text": {"content": resumen[:2000]}}]},
                  "Nuevos documentos": {"rich_text": [{"text": {"content": nuevos}}]},
                  "Run GitHub": {"url": run_url},
                  "Fuente": {"select": {"name": "Automatica"}},
                  "Fecha": {"date": {"start": fecha}}
              }
          }

          r = requests.post("https://api.notion.com/v1/pages", headers=headers, json=payload)
          print(f"Notion status: {r.status_code}")
          if r.status_code != 200:
              print(r.text)
          PYEOF

      - name: Crear Issue de notificacion
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE="${{ steps.review.outputs.fecha }}"
          RESULTADO="${{ steps.review.outputs.hay_cambios }}"
          if [ "$RESULTADO" = "true" ]; then
            TITULO="ATENCION - Revision trimestral ERE vs Catequesis - $DATE - HAY CAMBIOS"
          else
            TITULO="Revision trimestral ERE vs Catequesis - $DATE - Sin cambios"
          fi
          gh issue create \
            --title "$TITULO" \
            --body "Revision completada el $DATE. Ver registro detallado en Notion: https://www.notion.so/739fbeb2d24b4b879615a6247b402809"

      - name: Guardar registro
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE="${{ steps.review.outputs.fecha }}"
          HAY_CAMBIOS="${{ steps.review.outputs.hay_cambios }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p revisiones
          cp revision_result.json "revisiones/revision-$DATE.json"
          git add revisiones/
          git diff --staged --quiet || git commit -m "Revision trimestral $DATE"
          if [ "$HAY_CAMBIOS" = "true" ]; then
            BRANCH="actualizacion-trimestral-$DATE"
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
            gh pr create \
              --title "Revision trimestral $DATE - HAY CAMBIOS" \
              --body "Se detectaron cambios. Ver Notion para detalles." \
              --head "$BRANCH" \
              --base main
          else
            git push origin main
          fi
