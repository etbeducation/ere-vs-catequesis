name: Actualización Trimestral ERE vs Catequesis

on:
  schedule:
    - cron: '0 8 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Consultar Magisterium AI
        id: review
        env:
          MAGISTERIUM_API_KEY: ${{ secrets.MAGISTERIUM_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os
          from datetime import date

          api_key = os.environ["MAGISTERIUM_API_KEY"]
          today = date.today().isoformat()

          prompt = f"""Revisa la distinción ERE vs Catequesis según el Magisterio católico. Responde SOLO en JSON sin markdown:
          {{"hay_cambios": false, "nuevos_documentos": [], "correcciones": [], "resumen": "texto", "fecha_revision": "{today}"}}
          Documentos ya incluidos: The Religious Dimension of Education in a Catholic School (1988), Juan Pablo II Discurso 1981, Catechesi Tradendae (1979), Francisco Pacto Educativo Global (2020), Leon XIV Drawing New Maps of Hope (2025), Leon XIV Dilexi te (2025).
          Hay documentos nuevos del Magisterio relevantes posteriores a abril 2026?"""

          try:
              r = requests.post("https://www.magisterium.com/api/v1/chat/completions",
                  headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
                  json={"model": "magisterium-1", "messages": [{"role": "user", "content": prompt}]},
                  timeout=60)
              txt = r.json()["choices"][0]["message"]["content"].strip()
          except Exception as e:
              txt = f'{{"hay_cambios": false, "resumen": "Error: {e}", "fecha_revision": "{today}"}}'

          if '```' in txt:
              for p in txt.split('```'):
                  p = p.strip().lstrip('json').strip()
                  if p.startswith('{'):
                      txt = p; break

          try:
              data = json.loads(txt)
          except:
              data = {"hay_cambios": False, "resumen": "Error parseando", "fecha_revision": today}

          with open("revision_result.json", "w") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          resumen = data.get('resumen','Sin datos').replace('\n',' ')
          nuevos = ', '.join(data.get('nuevos_documentos',[])) or 'Ninguno'

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"hay_cambios={str(data.get('hay_cambios',False)).lower()}\n")
              f.write(f"resumen={resumen}\n")
              f.write(f"nuevos={nuevos}\n")
              f.write(f"fecha={today}\n")
          PYEOF

      - name: Notificar sin cambios (Issue con @mention)
        if: steps.review.outputs.hay_cambios == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fecha = '${{ steps.review.outputs.fecha }}';
            const resumen = '${{ steps.review.outputs.resumen }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `✅ Revisión trimestral ERE vs Catequesis - ${fecha} - Sin cambios`,
              body: `## Revisión trimestral completada\n\n@etbeducation\n\n**Fecha:** ${fecha}\n**Resultado:** ✅ Sin cambios necesarios\n\n### Resumen de Magisterium AI\n${resumen}\n\n### Conclusión\nLas referencias y contenidos del sitio web siguen siendo válidos y actualizados según el Magisterio.\n\n---\n*Revisión automática: GitHub Actions + Magisterium AI*`,
            });

      - name: Guardar registro sin cambios
        if: steps.review.outputs.hay_cambios == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE="${{ steps.review.outputs.fecha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p revisiones
          cp revision_result.json "revisiones/revision-$DATE.json"
          git add revisiones/
          git diff --staged --quiet || git commit -m "Revisión trimestral $DATE - sin cambios"
          git push origin main

      - name: Crear Pull Request si hay cambios
        if: steps.review.outputs.hay_cambios == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE="${{ steps.review.outputs.fecha }}"
          RESUMEN="${{ steps.review.outputs.resumen }}"
          NUEVOS="${{ steps.review.outputs.nuevos }}"
          BRANCH="actualizacion-trimestral-$DATE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          mkdir -p revisiones
          cp revision_result.json "revisiones/revision-$DATE.json"
          git add revisiones/
          git commit -m "Revisión trimestral $DATE - hay cambios"
          git push origin "$BRANCH"
          gh pr create \
            --title "📚 Revisión trimestral ERE vs Catequesis - $DATE" \
            --body "@etbeducation\n\n## 🚨 Se detectaron cambios\n\n**Fecha:** $DATE\n\n### Resumen\n$RESUMEN\n\n### Nuevos documentos\n$NUEVOS\n\n---\n*GitHub Actions + Magisterium AI*" \
            --head "$BRANCH" \
            --base main
