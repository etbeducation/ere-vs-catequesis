name: Actualización Trimestral ERE vs Catequesis

on:
  schedule:
    - cron: '0 8 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Consultar Magisterium AI y generar revisión
        id: review
        env:
          MAGISTERIUM_API_KEY: ${{ secrets.MAGISTERIUM_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import requests, json, os

          api_key = os.environ["MAGISTERIUM_API_KEY"]
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json"
          }

          prompt = """Revisa el contenido sobre la distinción entre la ERE y la Catequesis según el Magisterio católico.

          Responde SOLO en JSON con este formato exacto (sin markdown, sin backticks):
          {"hay_cambios": false, "nuevos_documentos": [], "correcciones": [], "resumen": "texto", "fecha_revision": "2026-04-27"}

          Documentos ya incluidos:
          - The Religious Dimension of Education in a Catholic School (1988)
          - Juan Pablo II, Discurso sacerdotes Roma, 5 marzo 1981
          - Catechesi Tradendae (1979)
          - Francisco, Pacto Educativo Global (2020)
          - Leon XIV, Drawing New Maps of Hope (2025)
          - Leon XIV, Dilexi te (2025)

          Hay algun documento nuevo del Magisterio relevante para esta distincion posterior a abril 2026?"""

          try:
              response = requests.post(
                  "https://www.magisterium.com/api/v1/chat/completions",
                  headers=headers,
                  json={
                      "model": "magisterium-1",
                      "messages": [{"role": "user", "content": prompt}]
                  },
                  timeout=60
              )
              print(f"Status: {response.status_code}")
              result = response.json()
              content = result["choices"][0]["message"]["content"].strip()
          except Exception as e:
              print(f"Error API: {e}")
              content = '{"hay_cambios": false, "nuevos_documentos": [], "correcciones": [], "resumen": "Error conectando con Magisterium AI - revisar manualmente", "fecha_revision": "2026-04-27"}'

          # Limpiar markdown si existe
          if '```' in content:
              parts = content.split('```')
              for p in parts:
                  p = p.strip()
                  if p.startswith('json'):
                      p = p[4:].strip()
                  if p.startswith('{'):
                      content = p
                      break

          try:
              data = json.loads(content)
          except:
              data = {"hay_cambios": False, "resumen": "Error parseando respuesta", "fecha_revision": "2026-04-27"}

          print(f"Resultado: {json.dumps(data, ensure_ascii=False, indent=2)}")

          with open("revision_result.json", "w") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"hay_cambios={str(data.get('hay_cambios', False)).lower()}\n")
              resumen = data.get('resumen', 'Sin cambios').replace('\n', ' ')
              f.write(f"resumen={resumen}\n")
          PYEOF

      - name: Crear Pull Request si hay cambios
        if: steps.review.outputs.hay_cambios == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="actualizacion-trimestral-$DATE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          mkdir -p revisiones
          cp revision_result.json "revisiones/revision-$DATE.json"
          git add revisiones/
          git commit -m "Revisión trimestral Magisterium AI - $DATE"
          git push origin "$BRANCH"
          gh pr create \
            --title "📚 Revisión trimestral ERE vs Catequesis - $DATE" \
            --body "Revisión automática via Magisterium AI. Ver revisiones/revision-$DATE.json para el detalle." \
            --head "$BRANCH" \
            --base main

      - name: Registrar revisión sin cambios
        if: steps.review.outputs.hay_cambios == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p revisiones
          cp revision_result.json "revisiones/revision-$DATE.json"
          git add revisiones/
          git diff --staged --quiet || git commit -m "Registro revisión trimestral $DATE - sin cambios"
          git push origin main
          echo "✅ Sin cambios necesarios - $DATE"

